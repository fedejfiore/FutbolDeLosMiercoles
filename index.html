<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Miércoles 19HS</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico"
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="floating-menu top">
        <a href="#inicio">🏠</a>
        <a href="#top3">🏆</a>
        <a href="#posiciones">📊</a>
        <a href="#partidos">📅</a>
        <a href="#sinergia">🔥</a>
    </nav>

    <header id="inicio" class="hero-section">
        <div class="hero-content">
            <img src="logo.png" alt="Logo" class="main-logo-v2">
            <h1>FÚTBOL DE LOS MIÉRCOLES</h1>
            
            <div class="countdown-argentina">
                <div class="arg-flag-strip"></div>
                <span class="label">MISION: EL MUNDIAL 2026</span>
                <div id="countdown" class="timer">--d --h</div>
                <div class="arg-flag-strip"></div>
            </div>

            <div class="video-link-container">
                <a href="https://www.sportsreel.com.ar/#/canchasEstablecimiento/21/cancha/30" target="_blank" class="btn-video-premium">
                    <span class="icon">🎥</span>
                    <span class="text">REPETICIONES SPORTSREEL</span>
                </a>
            </div>
        </div>
    </header>

    <div class="grass-background">
        <div class="container">
            
            <section id="top3" class="card-section stats-grid">
                <div class="stat-box">
                    <h3>⚽ Dueños de la Pelota</h3>
                    <div id="top-pelota" class="top-list">Cargando...</div>
                </div>
                <div class="stat-box">
                    <h3>🎽 Señores de la Pechera</h3>
                    <div id="top-pechera" class="top-list">Cargando...</div>
                </div>
            </section>

            <section id="posiciones" class="card-section">
                <h2>📊 Tabla de Posiciones</h2>
                <table id="tabla-general" class="display" style="width:100%">
                    <thead>
                        <tr><th>Jugador</th><th>PJ</th><th>Pts</th><th>Promedio</th></tr>
                    </thead>
                    <tbody id="body-general"></tbody>
                </table>
            </section>

            <section id="partidos" class="card-section">
                <h2>📅 Partidos y Crónicas</h2>
                <div id="contenedor-fechas" class="grid-fechas-scroll"></div>
            </section>

            <section id="sinergia" class="card-section">
                <h2>🔥 Sinergia (Mapa de Calor)</h2>
                <div id="heatmap-container"></div>
            </section>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
