<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFA | Gestión Oficial Fútbol Miércoles</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="afa-navbar">
        <div class="nav-container">
            <div class="nav-logo-left">
                <a href="#inicio">
                    <img src="https://www.afa.com.ar/img/site/logo-afa-dorado.svg" alt="AFA" class="navbar-afa-logo">
                </a>
            </div>
            <div class="nav-buttons-center">
                <a href="#inicio">🏠</a>
                <a href="#top3">🏆</a>
                <a href="#posiciones">📊</a>
                <a href="#partidos">📅</a>
                <a href="#sinergia">🔥</a>
            </div>
            <div id="clima-navbar" class="clima-glass">
                </div>
        </div>
    </nav>

    <header id="inicio" class="hero-section">
        <div class="hero-content">
            <img src="logo.png" alt="Logo Principal" class="main-logo-afa">
            
            <div class="hero-layout-row">
                <div class="side-btn-container">
                    <a href="https://www.sportsreel.com.ar/#/canchasEstablecimiento/21/cancha/30" target="_blank" class="btn-premium-v2">🎥 REPETICIONES</a>
                </div>

                <div class="center-counter-container">
                    <div class="countdown-argentina">
                        <span class="label">RUMBO AL MUNDIAL 2026</span>
                        <div id="countdown" class="timer">--d --h</div>
                    </div>
                </div>

                <div class="side-btn-container">
                    <button id="audio-control" class="btn-premium-v2">
                        <span class="icon">▶️</span> <span class="text">EL ASADO</span>
                    </button>
                    <audio id="main-audio" src="Dónde Están los Asados.mp3"></audio>
                </div>
            </div>

            <div class="sponsors-wall">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-adidas.png" alt="Adidas">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-cocacola.png" alt="Coca-Cola">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-ypf.png" alt="YPF">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-betano.png" alt="Betano">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-mcdonalds.png" alt="McDonalds">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-panini.png" alt="Panini">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-schneider.png" alt="Schneider">
                <img src="https://assets1.afa.com.ar/Sponsors/sponsor-binance.png" alt="Binance">
            </div>
        </div>
    </header>

    <div class="afa-main-bg">
        <div class="container">
            <section id="top3" class="stats-grid">
                <div class="stat-box-pitch">
                    <h3>⚽ DUEÑOS DE LA PELOTA</h3>
                    <div id="top-pelota"></div>
                </div>
                <div class="stat-box-pitch">
                    <h3>💰 POZO ACUMULADO</h3>
                    <div id="top-pozo"></div>
                </div>
                <div class="stat-box-pitch">
                    <h3>🎽 SEÑORES DE LA PECHERA</h3>
                    <div id="top-pechera"></div>
                </div>
            </section>

            <section id="posiciones" class="card-section">
                <h2 class="centered-title">🏆 TABLA DE POSICIONES</h2>
                <div class="collapsible-content">
                    <table id="tabla-general" class="display cell-border" style="width:100%">
                        <thead>
                            <tr>
                                <th>Nombre</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>Pts</th><th>Promedio</th>
                            </tr>
                        </thead>
                        <tbody id="body-general"></tbody>
                    </table>
                </div>
            </section>

            <section id="partidos" class="card-section">
                <h2 class="centered-title">📅 HISTORIAL DE PARTIDOS</h2>
                <div class="collapsible-content">
                    <div id="contenedor-fechas" class="mini-card-grid"></div>
                </div>
            </section>

            <section id="sinergia" class="card-section">
                <h2 class="centered-title">🔥 MAPA DE CALOR</h2>
                <div class="collapsible-content">
                    <input type="text" id="busqueda-matriz" placeholder="Buscar jugador en la matriz..." class="afa-search-input">
                    <div id="heatmap-container"></div>
                </div>
            </section>
        </div>
    </div>

    <div id="modal-partido" class="modal">
        <div class="modal-content-match">
            <span class="close-modal">✕</span>
            <div id="detalle-partido-dinamico"></div>
        </div>
    </div>

    <footer class="afa-footer">
        <img src="trofeo.png" alt="Trofeo" class="footer-trofeo">
        <p>AFA - GESTIÓN OFICIAL 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
